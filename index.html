<body class="bg-slate-50 font-[Inter] text-slate-900">
    <script>
        /**
         * Moteur de nettoyage et de rendu automatique Maieutik
         * Gère les corruptions de texte (OCR/Copy-paste) et le rendu LaTeX
         */
        const MaieutikTextEngine = {
            config: {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError: false
            },

            // Nettoie les nœuds textuels des caractères parasites
            sanitize(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    let text = node.textContent;
                    // 1. Recollage des lettres espacées (ex: "c o ˆ t e ˊ" -> "côté")
                    // On cible les séquences de lettres isolées suivies d'espaces
                    text = text.replace(/(?:(?<=\s|^)[a-zA-ZÀ-ÿ]\s){2,}[a-zA-ZÀ-ÿ]/g, m => m.replace(/\s/g, ''));
                    
                    // 2. Correction des accents décomposés (Unicode combining marks)
                    text = text.normalize('NFC');

                    // 3. Réparation des commandes LaTeX mal espacées (ex: "\ frac" -> "\frac")
                    text = text.replace(/\\\s+([a-z]+)/gi, '\\$1');

                    if (node.textContent !== text) node.textContent = text;
                } else {
                    node.childNodes.forEach(child => this.sanitize(child));
                }
            },

            // Applique le nettoyage et KaTeX sur un élément
            process(element) {
                if (!element || element.classList?.contains('katex')) return;
                this.sanitize(element);
                if (window.renderMathInElement) {
                    renderMathInElement(element, this.config);
                }
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            // Observation automatique du conteneur #app pour traiter le contenu dynamique
            const target = document.getElementById('app');
            const observer = new MutationObserver(mutations => {
                mutations.forEach(m => m.addedNodes.forEach(node => {
                    if (node.nodeType === 1) MaieutikTextEngine.process(node);
                }));
            });
            observer.observe(target, { childList: true, subtree: true });
            
            // Premier passage sur le body pour les éléments statiques
            MaieutikTextEngine.process(document.body);
        });
    </script>

    <div id="loadingApp" class="fixed inset-0 bg-white flex items-center justify-center z-[100]">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
    </div>
    <div class="min-h-screen flex flex-col bg-[#f8fafc]">

            <div class="flex items-center gap-3 cursor-pointer group" onclick="router.navigate('home')">

                <h1 class="text-xl font-bold tracking-tight text-slate-900">Maieutik</h1>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-500">
                <a href="#" class="hover:text-slate-900">Fonctionnalités</a>
                <a href="#" class="hover:text-slate-900">Solutions</a>
                <a href="#" class="hover:text-slate-900">Contact</a>
            </div>

            <div class="flex items-center gap-4">

                    <span id="user-display" class="text-sm font-semibold text-slate-700"></span>
                    <button onclick="authManager.logout()" class="text-sm text-red-500 hover:text-red-700 font-medium">Quitter</button>
                </nav>
                <div id="nav-auth" class="flex gap-2">
                    <button onclick="router.navigate('login')" class="px-5 py-2 text-sm font-bold text-slate-900 hover:bg-white/50 rounded-lg">Connexion</button>
                </div>
            </div>
        </header>

        <main id="app" class="flex-1 pt-24 px-6 container mx-auto max-w-4xl"></main>
        <footer class="py-12 border-t border-slate-200 text-center text-slate-400 text-sm font-medium tracking-wide bg-white/30">&copy; 2025 Maieutik — L'excellence de l'accompagnement pédagogique</footer>
    </div>

    <!-- Templates -->
    <template id="homePage">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16 items-center py-12 md:py-24">
            <div class="text-left space-y-8 order-2 md:order-1 animate-slide-up">
                <h1 class="font-serif text-5xl md:text-7xl leading-tight text-slate-900">
                    La maïeutique <br>
                    <span class="italic font-normal text-slate-500">réinventée par l'IA.</span>
                </h1>
                <p class="text-xl text-slate-600 leading-relaxed max-w-lg">
                    Accédez à un tuteur de haut niveau capable de décomposer les problèmes les plus complexes en étapes de raisonnement pures et logiques.
                </p>
                <div class="flex flex-wrap gap-4 pt-4">
                    <button onclick="router.navigate('signup')" class="btn-primary">Commencer l'expérience</button>
                    <button onclick="router.navigate('login')" class="btn-secondary">Découvrir les solutions</button>
                </div>
            </div>
            <div class="order-1 md:order-2 flex justify-center items-center">
                <svg class="w-full max-w-md drop-shadow-3xl" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="hubGradient" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#4f46e5" />
                            <stop offset="100%" stop-color="#3730a3" />
                        </radialGradient>
                        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    
                    <!-- Ondes de réflexion géométriques -->
                    <g fill="none" stroke="#cbd5e1" stroke-width="0.5">
                        <circle cx="200" cy="200" r="180" stroke-dasharray="1, 4" opacity="0.3" />
                        <circle cx="200" cy="200" r="140" opacity="0.4" />
                        <circle cx="200" cy="200" r="100" stroke-dasharray="4, 2" opacity="0.5" />
                    </g>

                    <!-- Réseau Neuronal (Connexions) -->
                    <g stroke="#94a3b8" stroke-width="0.5" opacity="0.6">
                        <line x1="200" y1="200" x2="310" y2="120" />
                        <line x1="200" y1="200" x2="90" y2="280" />
                        <line x1="200" y1="200" x2="200" y2="60" />
                        <line x1="200" y1="200" x2="340" y2="200" />
                        <line x1="200" y1="200" x2="60" y2="200" />
                        <line x1="200" y1="200" x2="290" y2="300" />
                        <line x1="200" y1="200" x2="110" y2="100" />
                    </g>

                    <!-- Nœuds de données -->
                    <g fill="#94a3b8">
                        <circle cx="310" cy="120" r="3" />
                        <circle cx="90" cy="280" r="3" />
                        <circle cx="200" cy="60" r="3" />
                        <circle cx="340" cy="200" r="3" />
                        <circle cx="60" cy="200" r="3" />
                        <circle cx="290" cy="300" r="3" />
                        <circle cx="110" cy="100" r="3" />
                    </g>

                    <!-- Nœud Central (Hub Maïeutique) -->
                    <circle cx="200" cy="200" r="30" fill="#4f46e5" opacity="0.05">
                        <animate attributeName="r" values="30;45;30" dur="4s" repeatCount="indefinite" />
                    </circle>
                    <circle cx="200" cy="200" r="10" fill="url(#hubGradient)" filter="url(#softGlow)" />
                </svg>
            </div>
        </div>
    </template>

    <template id="loginPage">
        <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm">
            <h2 class="text-2xl font-bold mb-6">Connexion</h2>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 border rounded-xl" required>
                <input type="password" id="loginPassword" placeholder="Mot de passe" class="w-full p-3 border rounded-xl" required>
                <div id="loginError" class="hidden text-red-500 text-sm"></div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Entrer</button>
            </form>
        </div>
    </template>

    <template id="signupPage">
        <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm">
            <h2 class="text-2xl font-bold mb-6">Inscription</h2>
            <form id="signupForm" class="space-y-4">
                <input type="text" id="signupUsername" placeholder="Nom d'utilisateur" class="w-full p-3 border rounded-xl" required>
                <input type="email" id="signupEmail" placeholder="Email" class="w-full p-3 border rounded-xl" required>
                <input type="password" id="signupPassword" placeholder="Mot de passe" class="w-full p-3 border rounded-xl" minlength="6" required>
                <div id="signupError" class="hidden text-red-500 text-sm"></div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Créer compte</button>
            </form>
        </div>
    </template>

    <template id="newDiscussionPage">
        <div class="max-w-4xl mx-auto pt-8 px-6 animate-slide-up">
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-xl">
                <form id="newExerciseForm" class="space-y-6">
                    <!-- ZONE ÉNONCÉ (Ligne 1) -->
                    <div class="space-y-3">
                        <h2 class="text-xl font-bold text-slate-800">Énoncé de l'exercice</h2>
                        <textarea id="exerciseInput" required 
                            class="w-full p-4 border border-slate-200 rounded-xl h-48 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 text-lg" 
                            placeholder="Collez votre énoncé ici ou décrivez votre problème..."></textarea>
                    </div>

                    <div id="scannerPreview" class="hidden flex gap-4 mt-2"></div>

                    <!-- BARRE D'OUTILS ET ACTIONS (Ligne 2) -->
                    <div class="flex flex-wrap items-center gap-4 pt-4 border-t border-slate-100">
                        <!-- À gauche : Mode -->
                        <div class="flex items-center gap-2">
                            <label for="ai-mode" class="text-xs font-bold text-slate-400 uppercase">Mode :</label>
                            <select id="ai-mode" class="p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="guide" selected>🧠 Guide Maïeutique</option>
                                <option value="solve">📝 Résolution Complète</option>
                                <option value="hint">💡 Indice Progressif</option>
                                <option value="explain">🎨 Explication Imagée</option>
                            </select>
                        </div>

                        <!-- Au centre : Actions secondaires -->
                        <div class="flex items-center gap-2">
                            <button type="button" id="scanBtn" onclick="document.getElementById('imageAttachment').click()" 
                                class="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition text-slate-600 shadow-sm" title="Scanner un exercice">
                                📸
                            </button>
                            <input type="file" id="imageAttachment" accept="image/*" class="hidden">
                            
                            <button type="button" id="micBtn" 
                                class="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition text-slate-600 shadow-sm" title="Saisie vocale">
                                🎙️
                            </button>
                        </div>

                        <!-- À droite : Soumission -->
                        <button type="submit" id="solveBtn" 
                            class="ml-auto bg-blue-600 text-white font-bold px-6 py-3 rounded-xl hover:bg-blue-700 hover:shadow-lg transition-all transform active:scale-[0.98]">
                            RÉSOUDRE AVEC L'IA
                        </button>
                    </div>

                    <div id="exerciseError" class="hidden text-red-500 text-sm p-3 bg-red-50 rounded-lg"></div>
                </form>
            </div>
        </div>
    </template>

    <template id="dashboardPage">
        <div class="max-w-7xl mx-auto py-8">
            <div class="mb-12">
                <h2 class="text-[#111827] text-3xl font-bold mb-2">Tableau de bord</h2>
                <p class="text-gray-500">Suivez vos progrès et reprenez vos exercices en cours.</p>
            </div>

            <!-- Grille de statistiques -->
            <div id="statsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <!-- Injecté par main.js -->
            </div>

            <!-- Grille d'historique -->
            <div class="mb-6 flex justify-between items-center">
                <h3 class="text-[#111827] text-xl font-bold">Historique des exercices</h3>
                <div class="flex gap-2" id="subjectFilters">
                    <button data-filter="all" class="px-3 py-1 text-xs font-bold rounded-lg bg-gray-900 text-white transition">Tous</button>
                    <button data-filter="MATHEMATICS" class="px-3 py-1 text-xs font-bold rounded-lg bg-gray-100 text-gray-600 hover:bg-blue-50 hover:text-blue-700 transition">Maths</button>
                    <button data-filter="PHILOSOPHY" class="px-3 py-1 text-xs font-bold rounded-lg bg-gray-100 text-gray-600 hover:bg-purple-50 hover:text-purple-700 transition">Philo</button>
                    <button data-filter="LOGIC" class="px-3 py-1 text-xs font-bold rounded-lg bg-gray-100 text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition">Logique</button>
                </div>
                <button onclick="router.newExercise()" class="hidden md:block text-sm font-bold text-blue-600 hover:text-blue-800">Nouvel exercice +</button>
            </div>
            <div id="dashboardCardsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
                <!-- Injecté par main.js -->
            </div>
        </div>
    </template>

    <template id="exercisePage">
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <form id="exerciseForm" class="space-y-4">
                    <div class="mode-selector-container" style="margin-bottom: 10px;">
                        <label for="ai-mode" style="font-weight: bold; margin-right: 5px;">Mode :</label>
                        <select id="ai-mode" style="padding: 5px; border-radius: 4px;">
                            <option value="guide" selected>🧠 Guide Maïeutique</option>
                            <option value="solve">📝 Résolution Complète</option>
                            <option value="hint">💡 Indice Progressif</option>
                            <option value="explain">🎨 Explication Imagée</option>
                        </select>
                    </div>
                    <label class="font-bold">Énoncé de l'exercice</label>
                    <textarea id="exerciseInput" class="w-full p-4 border rounded-xl h-32" placeholder="Collez votre énoncé ici..."></textarea>
                    
                    <div class="space-y-2">
                        <label class="font-bold text-sm">Votre tentative (optionnel)</label>
                        <textarea id="attemptInput" class="w-full p-3 border rounded-xl h-20 text-sm" placeholder="Ce que vous avez déjà essayé..."></textarea>
                    </div>

                    <div class="flex items-center justify-between">
                        <input type="file" id="exerciseFiles" multiple class="hidden" accept="image/*,application/pdf">
                        <button type="button" onclick="document.getElementById('exerciseFiles').click()" class="text-sm text-indigo-600 font-medium">📎 Ajouter image/PDF</button>
                        <span id="fileList" class="text-xs text-slate-500"></span>
                    </div>

                    <div id="exerciseError" class="hidden text-red-500 text-sm"></div>
                    <button type="submit" id="solveBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                        <span id="btnText">Résoudre avec l'IA</span>
                        <div id="btnLoader" class="hidden animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                    </button>
                </form>
            </div>

            <div id="cacheNotice" class="hidden bg-amber-50 border border-amber-200 p-3 rounded-xl text-amber-700 text-xs text-center">
                Résultat chargé depuis le cache local.
            </div>

            <div id="reasoningSection" class="hidden space-y-2">
                <h3 class="font-bold text-slate-500 text-sm uppercase tracking-wider">Démarche de réflexion</h3>
                <div id="reasoningContent" class="bg-slate-100 p-6 rounded-2xl border min-h-[100px] overflow-auto"></div>
            </div>

            <div id="solutionSection" class="hidden space-y-2">
                <h3 class="font-bold text-indigo-600 text-sm uppercase tracking-wider">Solution finale</h3>
                <div id="solutionContent" class="bg-white p-6 rounded-2xl border border-indigo-100 shadow-sm min-h-[100px] overflow-auto"></div>
            </div>
        </div>
    </template>

    <template id="profilePage">
        <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border shadow-sm space-y-6">
            <h2 class="text-2xl font-bold">Votre Profil</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Nom complet</label>
                    <input type="text" id="profileName" readonly class="w-full p-2 bg-slate-50 border rounded-lg">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Email</label>
                    <input type="email" id="profileEmail" readonly class="w-full p-2 bg-slate-50 border rounded-lg">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-indigo-50 p-4 rounded-xl text-center">
                        <div id="exerciseCount" class="text-2xl font-bold text-indigo-600">0</div>
                        <div class="text-xs text-indigo-400">Exercices</div>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl text-center">
                        <div id="joinDate" class="text-sm font-bold text-slate-600">-</div>
                        <div class="text-xs text-slate-400">Membre depuis</div>
                    </div>
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="router.navigate('dashboard')" class="w-full bg-slate-100 py-3 rounded-xl font-bold">Tableau de bord</button>
                <button onclick="authManager.logout()" class="w-full text-red-500 py-2 text-sm font-medium">Se déconnecter</button>
            </div>
        </div>
    </template>

    <script src="./exercises.js"></script>

</body>
